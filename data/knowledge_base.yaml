# База знаний бота-ассистента барбершопа «Борода&Бритва».
# Формат: список пунктов «вопрос → ответ». Чтобы расширить базу — просто
# добавьте новый пункт сюда и перезапустите бота, править код не нужно.

business:
  name: "Барбершоп «Борода&Бритва»"
  city: "Москва"

faq:
  - question: "Какие часы работы?"
    answer: "Мы работаем ежедневно с 10:00 до 22:00, без выходных."

  - question: "Где вы находитесь?"
    answer: "Москва, ул. Пушкина, д. 12, 1 этаж. Вход со стороны двора, есть вывеска."

  - question: "Как записаться?"
    answer: "Записаться можно по телефону +7 (495) 123-45-67 или через этого бота — напишите желаемую дату и услугу, администратор подтвердит."

  - question: "Сколько стоит мужская стрижка?"
    answer: "Мужская модельная стрижка — 1500 ₽."

  - question: "Сколько стоит стрижка бороды?"
    answer: "Моделирование и стрижка бороды — 1000 ₽."

  - question: "Сколько стоит стрижка машинкой (под одну насадку)?"
    answer: "Стрижка машинкой под одну насадку — 800 ₽."

  - question: "Есть ли услуга бритья опасной бритвой?"
    answer: "Да, королевское бритьё опасной бритвой с горячим полотенцем — 1200 ₽."

  - question: "Сколько стоит комплекс «стрижка + борода»?"
    answer: "Комплекс «стрижка + борода» — 2200 ₽ (выгоднее, чем по отдельности)."

  - question: "Делаете ли вы детские стрижки?"
    answer: "Да, стрижка для детей до 10 лет — 1000 ₽."

  - question: "Можно ли прийти без записи?"
    answer: "Можно, но при загруженности возможно ожидание. Лучше записаться заранее, чтобы прийти к свободному мастеру."

  - question: "Какие способы оплаты вы принимаете?"
    answer: "Принимаем наличные, банковские карты и оплату по QR (СБП)."

  - question: "Сколько по времени длится стрижка?"
    answer: "Мужская стрижка занимает около 40–60 минут, комплекс со стрижкой бороды — до 90 минут."

  - question: "Есть ли у вас подарочные сертификаты?"
    answer: "Да, есть подарочные сертификаты на любую сумму от 1000 ₽. Оформить можно в барбершопе или через администратора."

  - question: "Можно ли выбрать конкретного мастера?"
    answer: "Да, при записи скажите имя мастера, и мы подберём удобное время именно к нему."

  - question: "Что делать, если я опаздываю?"
    answer: "Предупредите нас по телефону. Если опоздание более 15 минут, возможно, придётся немного сдвинуть время или перезаписаться."

  - question: "Как отменить или перенести запись?"
    answer: "Позвоните по телефону +7 (495) 123-45-67 или напишите администратору здесь — отмена и перенос бесплатны."

  - question: "Есть ли парковка рядом?"
    answer: "Рядом есть платная городская парковка, а во дворе — несколько бесплатных мест для клиентов."

  - question: "Предоставляете ли вы напитки?"
    answer: "Да, пока вы у нас, угостим чаем, кофе или водой — бесплатно."
